<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Admin TIC</title>
    <style>
      :root {
        --bg: #eef3f8;
        --surface: rgba(255, 255, 255, 0.88);
        --ink: #102033;
        --muted: #5f6f82;
        --line: rgba(16, 32, 51, 0.1);
        --primary: #0f6d74;
        --primary-strong: #0a515d;
        --danger: #bb3f34;
        --shadow-lg: 0 28px 90px rgba(10, 41, 63, 0.12);
        --radius-xl: 32px;
        --radius-md: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Aptos", "Segoe UI Variable", "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 109, 116, 0.16), transparent 28%),
          radial-gradient(circle at top right, rgba(221, 140, 31, 0.12), transparent 24%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 52%, #dfeaf4 100%);
      }

      .login-card {
        width: min(460px, 100%);
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow-lg);
      }

      .login-badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(15, 109, 116, 0.1);
        color: var(--primary-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(2rem, 5vw, 2.5rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.94);
        color: var(--ink);
        font: inherit;
      }

      input:focus-visible {
        outline: 3px solid rgba(15, 109, 116, 0.18);
        outline-offset: 2px;
      }

      button {
        appearance: none;
        border: none;
        border-radius: var(--radius-md);
        padding: 14px 18px;
        background: linear-gradient(135deg, rgba(15, 109, 116, 0.98), rgba(10, 81, 93, 0.94));
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(15, 109, 116, 0.18);
      }

      button:disabled {
        opacity: 0.68;
        cursor: wait;
      }

      .login-message {
        min-height: 22px;
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .login-message[data-state="error"] {
        color: var(--danger);
      }

      .login-message[data-state="loading"] {
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <div class="login-badge">Admin Login</div>
      <h1>FieldForce Command Center</h1>

      <form id="loginForm">
        <label>
          Username
          <input id="usernameInput" name="username" type="text" autocomplete="username" required />
        </label>

        <label>
          Password
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button id="submitButton" type="submit">Masuk</button>
      </form>

      <div id="loginMessage" class="login-message" aria-live="polite"></div>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const usernameInput = document.getElementById("usernameInput");
      const passwordInput = document.getElementById("passwordInput");
      const submitButton = document.getElementById("submitButton");
      const message = document.getElementById("loginMessage");
      const next = new URLSearchParams(window.location.search).get("next") || "/admin";

      function setMessage(text, state = "") {
        message.textContent = text;
        if (state) {
          message.dataset.state = state;
        } else {
          delete message.dataset.state;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        setMessage("Memverifikasi akses admin...", "loading");

        try {
          const response = await fetch("/api/admin/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: usernameInput.value.trim(),
              password: passwordInput.value,
            }),
          });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Login gagal.");
          }

          window.location.href = next;
        } catch (error) {
          setMessage(error.message || "Login gagal.", "error");
          submitButton.disabled = false;
          passwordInput.focus();
          passwordInput.select();
        }
      });
    </script>
  </body>
</html>

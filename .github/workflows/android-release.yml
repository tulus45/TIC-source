name: Android Release

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      RELEASE_ASSET_NAME: tic-latest.apk
      RELEASE_METADATA_FILE: app/release.properties
      BACKEND_RELEASE_METADATA_FILE: backend/release.properties
      VERSION_METADATA_FILE: app/version.properties

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Secret $key belum diisi. Workflow release APK dihentikan."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          TIC_RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          TIC_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TIC_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TIC_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Read release version metadata
        id: release_meta
        run: |
          version_code=$(grep '^appVersionCode=' "$VERSION_METADATA_FILE" | cut -d= -f2-)
          version_name=$(grep '^appVersionName=' "$VERSION_METADATA_FILE" | cut -d= -f2-)
          tag_name="apk-v${version_name}"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "download_url=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${RELEASE_ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare latest APK asset
        run: |
          cp "app/build/outputs/apk/release/app-release.apk" "$RELEASE_ASSET_NAME"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${{ steps.release_meta.outputs.tag_name }}"
          title="APK ${{ steps.release_meta.outputs.version_name }}"
          notes=$(cat <<EOF
          Automated Android release

          - Version code: ${{ steps.release_meta.outputs.version_code }}
          - Version name: ${{ steps.release_meta.outputs.version_name }}
          - Stable download URL: ${{ steps.release_meta.outputs.download_url }}
          EOF
          )

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "$RELEASE_ASSET_NAME" --clobber
            gh release edit "$tag_name" --title "$title" --notes "$notes" --latest
          else
            gh release create "$tag_name" "$RELEASE_ASSET_NAME" --title "$title" --notes "$notes" --latest
          fi

      - name: Refresh committed release metadata
        run: |
          updated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${RELEASE_ASSET_NAME}"

          cat > "$RELEASE_METADATA_FILE" <<EOF
          # Auto-generated by the GitHub release workflow.
          appVersionCode=${{ steps.release_meta.outputs.version_code }}
          appVersionName=${{ steps.release_meta.outputs.version_name }}
          releaseAssetName=${RELEASE_ASSET_NAME}
          updateUrl=${download_url}
          updatedAt=${updated_at}
          EOF

          cat > "$BACKEND_RELEASE_METADATA_FILE" <<EOF
          # Auto-generated by the GitHub release workflow.
          appVersionCode=${{ steps.release_meta.outputs.version_code }}
          appVersionName=${{ steps.release_meta.outputs.version_name }}
          releaseAssetName=${RELEASE_ASSET_NAME}
          updateUrl=${download_url}
          updatedAt=${updated_at}
          EOF

      - name: Commit bumped APK metadata
        run: |
          if git diff --quiet -- "$VERSION_METADATA_FILE" "$RELEASE_METADATA_FILE" "$BACKEND_RELEASE_METADATA_FILE"; then
            echo "Tidak ada metadata APK yang berubah."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_METADATA_FILE" "$RELEASE_METADATA_FILE" "$BACKEND_RELEASE_METADATA_FILE"
          git commit -m "chore: bump APK release metadata [skip release]"
          git push
